
	# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1
workspace=DP-1,1
# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = waybar & hyprpaper

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi --show drun

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = fr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 2
    border_size = 2
    #col.active_border = 0x66ee1111
    col.active_border = 0xff9370DB 
    col.inactive_border = 0x8A8A2BE2
    apply_sens_to_raw=0
    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
   blur {
        enabled = true
        size = 5
        passes = 5
   }


    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

}

animations {
    enabled = 1

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    #bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, default
    #animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    #animation = borderangle, 1, 8, default
    animation = fade, 1, 10, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    #pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    #preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

#misc {
#    # See https://wiki.hyprland.org/Configuring/Variables/ for more
#    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

windowrulev2 = opacity 0.8 0.6,class:^(kitty)$
windowrulev2 = opacity 1 1,class:^(rofi)$
windowrulev2 = idleinhibit focus, class:^(rofi)$
windowrulev2 = forceinput, class:^(rofi)$
windowrulev2 = windowdance, class:^(rofi)$

#windowrulev2 = opacity 0.5 0.5,floating:1
windowrule = move cursor -50% -50%,^(kitty)$ # moves kitty to the center of the cursor
windowrule = move cursor -50% -50%,^(rofi)$ # moves kitty to the center of the cursor

# some nice mouse binds
bindm=SUPER,mouse:272,movewindow
bindm=SUPER,mouse:273,resizewindow

# example binds
bind=SUPER,RETURN,exec,kitty
bind=SUPER, Q,killactive,
bind=SUPER,M,exit,
bind=SUPER,E,exec,nautilus &
bind=SUPER,V,togglefloating,
bind=SUPER,D,exec,wofi --show drun -o DP-3
bind=SUPER,RETURN,exec,alacritty

#focus
bind=SUPER,left,movefocus,l
bind=SUPER,right,movefocus,r
bind=SUPER,up,movefocus,u
bind=SUPER,down,movefocus,d

#movewindow
bind=SUPERSHIFT,left,movewindow,l
bind=SUPERSHIFT,right,movewindow,r
bind=SUPERSHIFT,up,movewindow,u
bind=SUPERSHIFT,down,movewindow,d

#resize
bind=SUPERALT,left,resizeactive,-20 0
bind=SUPERALT,right,resizeactive,20 0
bind=SUPERALT,up,resizeactive,0 -20
bind=SUPERALT,down,resizeactive,0 20

#workspace
bind=SUPER,ampersand,workspace,1
bind=SUPER,eacute,workspace,2
bind=SUPER,quotedbl,workspace,3
bind=SUPER,apostrophe,workspace,4
bind=SUPER,parenleft,workspace,5
bind=SUPER,egrave,workspace,6
bind=SUPER,minus,workspace,7
bind=SUPER,underscore,workspace,8
bind=SUPER,ccedilla,workspace,9
bind=SUPER,agrave,workspace,10

#fullscreen
bind=SUPER,F,fullscreen,0

#son
bind=,XF86AudioRaiseVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ +5%
bind=,XF86AudioLowerVolume,exec,pactl set-sink-volume @DEFAULT_SINK@ -5%
bind=,XF86AudioMute,exec,pactl set-sink-volume @DEFAULT_SINK@ 0%
bind=,XF86MonBrightnessUp,exec,brightnessctl set +5%
bind=,XF86MonBrightnessDown,exec,brightnessctl set 5%-
exec-once=hyprpaper
exec-once = dunst 

bind=,Print,exec,~/mpi/aur/contrib/grimblast/grimblast copysave area
#exec-once=waybar
exec-once=redshift -l 48.86:2.35
exec-once=fcitx -d


#movetoworkspace
bind=ALT,ampersand,movetoworkspace,1
bind=ALT,eacute,movetoworkspace,2
bind=ALT,quotedbl,movetoworkspace,3
bind=ALT,apostrophe,movetoworkspace,4
bind=ALT,parenleft,movetoworkspace,5
bind=ALT,egrave,movetoworkspace,6
bind=ALT,minus,movetoworkspace,7
bind=ALT,underscore,movetoworkspace,8
bind=ALT,ccedilla,movetoworkspace,9
bind=ALT,agrave,movetoworkspace,10

bind=SUPER,mouse_down,workspace,e+1
bind=SUPER,mouse_up,workspace,e-1

# screenshot with hyprshot
bind=ALT,s, exec, hyprshot -m region

#lock screen
bind=SUPER,L,exec,hyprlock

#rofi

bind=SUPER, D, exec, pkill rofi || rofi -show drun

